<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>部室予約</title>

<style>
body {
  font-family: sans-serif;
  max-width: 500px;
  margin: auto;
  padding: 10px;
}

form {
  background: #f2f2f2;
  padding: 10px;
  border-radius: 10px;
}

input, button, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

.card {
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>

</head>
<body>

<h1>部室予約</h1>

<!-- 使用状況 -->
{% if in_use %}
  <div style="background:red;color:white;padding:10px;border-radius:10px;text-align:center;">
    🔴 使用中（{{ current_user }}さん）
  </div>
{% else %}
  <div style="background:green;color:white;padding:10px;border-radius:10px;text-align:center;">
    🟢 空いています
  </div>
{% endif %}

<hr>

<!-- 予約フォーム -->
<form action="/add" method="post">

  名前：
  <input name="name" required>

  日付：
  <input type="date" name="date" required min="{{ today }}">

  時間枠：
  <select name="slot">
    {% for s in slots %}
      <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
  </select>

  <button type="submit">予約</button>
</form>

<hr>

<h2>予約一覧（日時ごと）</h2>

<!-- 日付ごとに表示 -->
{% for date, items in grouped.items() %}

  <h3 style="margin-top:20px; border-bottom:1px solid #ccc;">
    {{ date }}
  </h3>

  {% for r in items %}
    <div class="card">

      <b>{{ r.slot }}</b><br>
      {{ r.name }}

      <!-- 削除ボタン -->
      <form action="/delete" method="post" style="margin-top:10px;">
        <input type="hidden" name="date" value="{{ r.date }}">
        <input type="hidden" name="slot" value="{{ r.slot }}">
        <input type="hidden" name="name" value="{{ r.name }}">

        <button style="background:red;color:white;">
          取消
        </button>
      </form>

    </div>
  {% endfor %}

{% endfor %}

</body>
</html>
